name: Sample Scenario Smoke Test

# Weekly smoke test of the "new user journey":
# scaffold a project with init-pagewalker-project (published npm package),
# and run the sample scenario
#
on:
  schedule:
    - cron: '0 0 * * 1'   # every Monday 00:00 UTC (09:00 JST)
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  smoke:
    name: Scaffold and run sample scenario
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Setup packages
        run: |
          sudo apt-get update -q
          sudo apt-get install -y libnss3 libasound2t64 libgbm-dev
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
      - name: Scaffold a new pagewalker project (as a new user would)
        run: |
          mkdir smoke && cd smoke
          npx --yes --package=pagewalker -- init-pagewalker-project
          npm install
      - name: Run the sample scenario against github.com
        run: cd smoke && npm test -- --silent
      - name: Create an issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Sample scenario smoke test failed (${new Date().toISOString().slice(0, 10)})`,
              body: [
                `週次スモークテストが失敗しました: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                ``,
                `01_sample_scenario.js が GitHub の UI 変更などで壊れている可能性があります。`,
              ].join('\n'),
            });
